spring.application.name=FashionRecommendationApp
# ===================================================================
# H2 DATABASE CONFIGURATION
# ===================================================================

# Define the in-memory database URL and name (fashiondb)
spring.datasource.url=jdbc:h2:mem:fashiondb
spring.datasource.driverClassName=org.h2.Driver

# Default credentials for local development
spring.datasource.username=sa
spring.datasource.password=password

# ===================================================================
# H2 WEB CONSOLE CONFIGURATION
# ===================================================================

# Enable the browser-based UI console
spring.h2.console.enabled=true

# Access the console at: http://localhost:8080/h2-console
spring.h2.console.path=/h2-console

# Fix to allow modern browsers to render the H2 console UI inside frames
spring.headers.frameOptions.sameOrigin=true

# ===================================================================
# JPA / HIBERNATE CONFIGURATION
# ===================================================================

# Automatically create/update database tables based on your Java entities
spring.jpa.hibernate.ddl-auto=update

# Print SQL queries directly to the console terminal for easy debugging
spring.jpa.show-sql=true

# Tell Hibernate to format the SQL logs cleanly
spring.jpa.properties.hibernate.format_sql=true

# Force Hibernate to optimize queries using the H2 database dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.security.user.name=user
spring.security.user.password=password